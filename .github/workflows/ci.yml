name: Notebook rebuild CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  MODEL_PROVIDER: mock
  UV_FROZEN: "1"
  UV_NO_PROGRESS: "1"

jobs:
  core:
    name: Core contracts and plain notebook / Python 3.11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.20"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv lock --check
      - run: uv sync --dev --frozen
      - name: Format check
        run: uv run ruff format --check src tests
      - name: Lint
        run: uv run ruff check src tests
      - name: Strict contract typing
        run: uv run mypy src tests
      - name: Contract and mock notebook tests
        run: uv run pytest -q

  langgraph-notebook:
    name: LangGraph notebook / Python 3.11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.20"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --dev --extra langgraph --frozen
      - name: Execute matched LangGraph patterns with mock decisions
        run: uv run pytest -q tests/test_notebook_mock_execution.py -k langgraph
