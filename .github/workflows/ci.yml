name: Notebook rebuild CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  MODEL_PROVIDER: mock
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
  UV_FROZEN: "1"
  UV_NO_PROGRESS: "1"

jobs:
  core:
    name: Core contracts and plain notebook / Python 3.11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.20"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv lock --check
      - run: uv sync --dev --frozen
      - name: Format check
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Strict contract typing
        run: uv run mypy src tests
      - name: Contract and mock notebook tests
        run: uv run pytest -q

  framework-notebooks:
    name: ${{ matrix.label }} notebook / Python 3.11
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: LangGraph
            extra: langgraph
            selector: langgraph
          - label: CrewAI
            extra: crewai
            selector: crewai
          - label: OpenAI Agents
            extra: openai-agents
            selector: agents
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.20"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --dev --extra ${{ matrix.extra }} --frozen
      - name: Execute matched framework notebooks with mock decisions
        run: uv run pytest -q tests/test_notebook_mock_execution.py -k ${{ matrix.selector }}
