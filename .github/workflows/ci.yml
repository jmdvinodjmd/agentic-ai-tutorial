name: Notebook rebuild CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  MODEL_PROVIDER: mock
  UV_FROZEN: "1"
  UV_NO_PROGRESS: "1"

jobs:
  milestone-one:
    name: Contracts, mock qualification, and notebook / Python 3.11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.20"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv lock --check
      - run: uv sync --dev --frozen
      - name: Format check
        run: >-
          uv run ruff format --check
          src/agentic_tutorial/models
          src/agentic_tutorial/schemas
          src/agentic_tutorial/tracing
          src/agentic_tutorial/evaluation
          src/agentic_tutorial/fixtures
          tests/test_models.py
          tests/test_fixtures.py
          tests/test_model_qualification.py
          tests/test_notebook_mock_execution.py
      - name: Lint
        run: >-
          uv run ruff check
          src/agentic_tutorial/models
          src/agentic_tutorial/schemas
          src/agentic_tutorial/tracing
          src/agentic_tutorial/evaluation
          src/agentic_tutorial/fixtures
          tests/test_models.py
          tests/test_fixtures.py
          tests/test_model_qualification.py
          tests/test_notebook_mock_execution.py
      - name: Strict contract typing
        run: >-
          uv run mypy
          src/agentic_tutorial/models
          src/agentic_tutorial/schemas
          src/agentic_tutorial/tracing
          src/agentic_tutorial/evaluation
          src/agentic_tutorial/fixtures
          tests/test_models.py
          tests/test_fixtures.py
          tests/test_model_qualification.py
      - name: Contract and mock notebook tests
        run: >-
          uv run pytest -q
          tests/test_fixtures.py
          tests/test_models.py
          tests/test_model_qualification.py
          tests/test_notebook_mock_execution.py
          tests/test_model_interface.py
          tests/test_offline_clients.py
          tests/test_schemas.py
          tests/test_tracing.py
